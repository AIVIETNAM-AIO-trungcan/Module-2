# Central Pipeline Configuration File
# -----------------------------------
# Purpose:
#     This file acts as the master control panel for the credit scoring project.
#     It allows to adjust features and model parameters dynamically.
#
# Usages:
#     Modified directly by team members to configure paths, features, and models
#     without changing any underlying Python source code.

# 1. Define raw data file and dataset splitting parameters
data:
  # The raw dataset file name stored insided the data/raw folder
  raw_file_name: "credit_risk_dataset.csv"

  split_params:
    test_size: 0.2 # Percent of data saved for final testing (20%)
    val_size: 0.16 # Percent of data saved for validation (20%)
    random_state: 42 # Controls shuffling to ensure repeatable splits
    stratify: true # Keeps the balance of bad customers equal across splits

# 2. Define analytical feature groupings for the pipeline
features:
  # Columns containing continious numbers to be cleaned and binned
  numerical:
    - "person_age"
    - "person_income"
    - "person_emp_length"
    - "loan_amnt"
    - "loan_int_rate"
    - "loan_percent_income"
    - "cb_person_cred_hist_length"

  # Column containing text categories to be cleaned and mapped to WoE
  categorical:
    - "person_home_ownership"
    - "loan_intent"
    - "cb_person_default_on_file"
    - "loan_grade"

# 3. Define target variable for model prediction
target: "loan_status" # The column name where 1 = Bad and 0 = Good customer

# 4. Define Hyperparameters for the baseline machine learning model
model:
  logistic_regression:
    random_state: 42
    max_iter: 100
    c_parameter: 1.0
